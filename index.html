<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>cetzit</title>
    <script type="module">
      import { CetzitBrowserHost } from "./src/gui/CetzitBrowserHost.tsx";
      window.addEventListener('load', () => {
        const host = new CetzitBrowserHost();
        const container = document.getElementById("root");
        const initialContent = {
          config: { enableAnimations: true },
          document: `#import "/cetzit.typ": *\n#import "/styles.typ": *\n#import "@preview/cetz:0.5.0"\n\n#let fig1(scale: 1.0) = cetzit-render(\n  scale: scale,\n  cetz.canvas({\n    diagram(\n      nodes: (),\n      edges: (),\n    )\n  }),\n)\n`,
          styles: `#let z-spider = (shape: "pill", fill: rgb(221, 255, 221), stroke: black + 0.4pt, min-width: 0.5, min-height: 0.5)\n#let x-spider = (shape: "pill", fill: rgb(255, 221, 221), stroke: black + 0.4pt, min-width: 0.5, min-height: 0.5)\n`,
          styleFile: "styles.typ",
        };
        host.renderFigureEditor(container, initialContent);
      });
    </script>
  </head>
  <body>
    <div id="root" style="width: 100%; height: 100%;"></div>
  </body>
</html>
